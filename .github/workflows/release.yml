name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build vote-engine binaries
        run: |
          mkdir -p dist
          cd vote-engine
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/vote-engine-windows-amd64.exe .
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/vote-engine-linux-amd64 .

      - name: Package the ChaosMod (drop into ue4ss/Mods/)
        run: |
          mkdir -p stage/Sub2Chaos/tools
          cp -r mod/Scripts mod/enabled.txt mod/SN2ModSettings_registration.lua stage/Sub2Chaos/
          cp events.json stage/Sub2Chaos/
          cp tools/probe.lua stage/Sub2Chaos/tools/
          (cd stage && zip -r ../dist/Sub2Chaos-mod.zip Sub2Chaos)

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/vote-engine-windows-amd64.exe
            dist/vote-engine-linux-amd64
            dist/Sub2Chaos-mod.zip
